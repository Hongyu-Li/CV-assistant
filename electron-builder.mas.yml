appId: com.tc9011.cv-assistant
productName: CV-Assistant
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!**/node_modules/@tailwindcss/oxide*/**'
  - '!**/node_modules/tailwindcss/**'
  - '!**/node_modules/tailwindcss-animate/**'
  - '!**/node_modules/electron-updater/**'
  - '!**/node_modules/builder-util-runtime/**'
  # Exclude dev/build artifacts and docs from asar
  - '!scripts/**'
  - '!docs/**'
  - '!coverage/**'
  - '!coverage-e2e/**'
  - '!tests/**'
  - '!playwright-report/**'
  - '!test-results/**'
  - '!.ruff_cache/**'
  - '!.venv/**'
  - '!.husky/**'
  - '!{AGENTS.md,README.zh-CN.md,LICENSE,components.json}'
  - '!{playwright.config.ts,vitest.config.ts}'
  - '!electron-builder.{yml,mas.yml}'
  - '!{.gitignore,.editorconfig}'
  - '!*.sh'
  - '!*.tsbuildinfo'
  - '!package.json.bak'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  target:
    - target: mas
      arch:
        - universal
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  extraResources:
    - from: build/Assets.car
      to: Assets.car
  # WORKAROUND for electron-builder bug #9507 (v26.0.13–26.8.1):
  # signApp() ignores mas config and uses mac config for the first signing pass,
  # picking "Developer ID Application" cert instead of "Apple Distribution".
  # Setting identity to null here skips this broken pass.
  # The correct MAS signing pass uses mas.identity (set below) which overrides
  # this null via deepAssign() — deepAssign skips undefined but applies explicit values.
  identity: null
  extendInfo:
    CFBundleDisplayName: 简历助手
    CFBundleName: CV-Assistant
    CFBundleIconName: AppIcon
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
mas:
  type: distribution
  # Empty string identity overrides mac.identity=null via deepAssign (skips undefined,
  # applies empty string). In sign(), empty string is NOT null so signing proceeds.
  # findIdentity() treats empty string as falsy → auto-discovers correct MAS certs.
  identity: ''
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  hardenedRuntime: false
  gatekeeperAssess: false
  x64ArchFiles: '*'
  singleArchFiles: '*'
  provisioningProfile: build/CV_Assistant_Distribution.provisionprofile
  signIgnore:
    - '\.pak$'
npmRebuild: false
